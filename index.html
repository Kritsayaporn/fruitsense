<script>
let stream = null;
let cameraOn = false;
let history = [];

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const btnCamera = document.getElementById('btnCamera');
const btnCapture = document.getElementById('btnCapture');
const placeholder = document.getElementById('placeholder');
const scanLine = document.getElementById('scanLine');

async function toggleCamera() {
  if (!cameraOn) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });

      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      scanLine.style.display = 'block';

      btnCamera.textContent = '⏹ ปิดกล้อง';
      btnCapture.disabled = false;

      cameraOn = true;

    } catch(e) {
      showError('ไม่สามารถเปิดกล้องได้');
    }

  } else {

    if(stream) stream.getTracks().forEach(t=>t.stop());

    video.style.display='none';
    placeholder.style.display='flex';
    scanLine.style.display='none';

    btnCamera.textContent='📷 เปิดกล้อง';
    btnCapture.disabled=true;

    cameraOn=false;

  }
}


async function capture(){

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext('2d');

ctx.save();
ctx.scale(-1,1);
ctx.drawImage(video,-canvas.width,0);
ctx.restore();


/* ⭐ สำคัญ: เอา Base64 เต็ม */
const base64 = canvas.toDataURL('image/jpeg',0.9);


/* แสดงรูป */
const snap=document.getElementById('snapshot');
snap.src=base64;
snap.className='show';


document.getElementById('resultCard').classList.remove('show');
document.getElementById('limitCard').classList.remove('show');

document.getElementById('loadingState').classList.add('show');

document.getElementById('errorBox').classList.remove('show');

btnCapture.disabled=true;



try{

const res=await fetch('/api/analyze',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
imageBase64:base64
})

});


const data=await res.json();

document.getElementById('loadingState').classList.remove('show');


if(res.status===429 || data.limitReached){

document.getElementById('limitCard').classList.add('show');

btnCapture.disabled=false;

return;

}


if(!res.ok) throw new Error(data.error || 'Server error');


if(data.isNotFruit){

showError('ไม่พบผลไม้');

btnCapture.disabled=false;

return;

}


renderResult(data);

addHistory(data);


}catch(e){

document.getElementById('loadingState').classList.remove('show');

showError(e.message);

btnCapture.disabled=false;

}

}



function renderResult(r){

document.getElementById('rFruitEmoji').textContent=r.emoji||'🍎';

document.getElementById('rFruitName').textContent=r.fruitName;

document.getElementById('rFruitEn').textContent=r.fruitNameEn;

document.getElementById('rPct').textContent=r.ripeness+'%';

document.getElementById('rColor').textContent=r.color;

document.getElementById('rEat').textContent=r.eatIn;

document.getElementById('rTexture').textContent=r.texture;

document.getElementById('rSmell').textContent=r.smell;

document.getElementById('rAdvice').textContent=r.advice;


const meter=document.getElementById('rMeter');

const pct=r.ripeness;

meter.style.width=pct+'%';


document.getElementById('resultCard').classList.add('show');

btnCapture.disabled=false;

}



function addHistory(r){

history.unshift(r);

if(history.length>5) history.pop();


const section=document.getElementById('historySection');

const list=document.getElementById('historyList');

section.style.display='block';


list.innerHTML=history.map(h=>`

<div class="history-item">

<span class="hi-emoji">${h.emoji||'🍎'}</span>

<div class="hi-info">

<div class="hi-name">${h.fruitName}</div>

<div class="hi-status">${h.statusTh}</div>

</div>

<span class="hi-pct">${h.ripeness}%</span>

</div>

`).join('');

}



function showError(msg){

const box=document.getElementById('errorBox');

box.textContent='⚠️ '+msg;

box.classList.add('show');

setTimeout(()=>box.classList.remove('show'),5000);

}
</script>
